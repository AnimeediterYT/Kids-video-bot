name: Full AI Video System

on:
  schedule:
    # 💥 SLOT 1: 8:00 AM EST (1:00 PM UTC) -> Morning rush hour for USA (Shorts #1)
    - cron: "0 13 * * *"
    
    # 💥 SLOT 2: 12:00 PM EST (5:00 PM UTC) -> Lunch break scroll for USA (Long video)
    - cron: "0 17 * * *"
    
    # 💥 SLOT 3: 6:00 PM EST (11:00 PM UTC) -> Prime time relaxing evening for USA (Shorts #2)
    - cron: "0 23 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install ImageMagick (Fixes Subtitle Crash)
        run: |
          sudo apt-get update
          sudo apt-get install -y imagemagick
          sudo sed -i 's/domain="coder" rights="none" pattern="PDF"/domain="coder" rights="read|write" pattern="PDF"/' /etc/ImageMagick-6/policy.xml
          sudo sed -i 's/domain="path" rights="none" pattern="@\*"/domain="path" rights="read|write" pattern="@\*"/' /etc/ImageMagick-6/policy.xml

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install edge-tts moviepy==1.0.3 imageio[ffmpeg] google-api-python-client google-auth google-auth-oauthlib requests

      - name: Create folders & Workspace Auto-Cleanup
        run: |
          mkdir -p stories audio videos output
          echo "Purging local cached media resources..."
          find . -type f \( -name "*.mp3" -o -name "*.mp4" \) -delete

      - name: Generate script + voice
        env:
          PRIMARY_AI_API_KEY: ${{ secrets.PRIMARY_AI_API_KEY }}
          BACKUP_AI_API_KEY: ${{ secrets.BACKUP_AI_API_KEY }}
        run: python generate.py

      - name: Create video
        run: python video.py

      - name: Upload to YouTube
        env:
          YOUTUBE_CLIENT_SECRETS: ${{ secrets.YOUTUBE_CLIENT_SECRETS }}
          YOUTUBE_REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
        run: python Upload.py

      - name: Commit Status & First-Run Marker
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if [ -f first_run_done.txt ] && git status --porcelain | grep first_run_done.txt; then
            git add first_run_done.txt
            git commit -m "System Status: First run cleanup execution complete [skip ci]"
            git push origin HEAD:main
          fi
          

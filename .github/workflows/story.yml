name: Full AI Video System

on:
  schedule:
    # 💥 SLOT 1: 8:00 AM EST (1:00 PM UTC) -> Morning rush hour for USA (Shorts #1)
    - cron: "0 13 * * *"
    
    # 💥 SLOT 2: 12:00 PM EST (5:00 PM UTC) -> Lunch break scroll for USA (Long video)
    - cron: "0 17 * * *"
    
    # 💥 SLOT 3: 6:00 PM EST (11:00 PM UTC) -> Prime time relaxing evening for USA (Shorts #2)
    - cron: "0 23 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install edge-tts moviepy==1.0.3 imageio[ffmpeg] google-api-python-client google-auth google-auth-oauthlib requests

      - name: Create folders
        run: |
          mkdir -p stories audio videos

      - name: Generate script + voice
        run: python generate.py

      - name: Create video
        run: python video.py

      - name: Upload to YouTube
        run: python Upload.py

      - name: Commit output
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "auto video uploaded" || exit 0
          git push origin HEAD:main
          

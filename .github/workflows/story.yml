name: Story Video Generator

permissions:
  contents: write

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          pip install moviepy

      - name: Create folders
        run: |
          mkdir -p stories videos

      - name: Generate Story
        run: |
          TOPIC=$(shuf -n 1 topics.txt)

          echo "Topic: $TOPIC" > stories/story.txt
          echo "" >> stories/story.txt
          echo "Hook: Have you ever thought about $TOPIC?" >> stories/story.txt
          echo "Story: Many people ignore $TOPIC in life." >> stories/story.txt
          echo "Moral: $TOPIC is important for success." >> stories/story.txt
          echo "Ending: Respect $TOPIC and improve your life." >> stories/story.txt

      - name: Create Video
        run: |
          python - <<EOF
from moviepy.editor import *

text = open("stories/story.txt", "r", encoding="utf-8").read()

bg = ColorClip(size=(1080,1920), color=(0,0,0), duration=8)

txt = TextClip("Your Story is Ready", fontsize=70, color='white')
txt = txt.set_duration(8).set_position("center")

video = CompositeVideoClip([bg, txt])

video.write_videofile("videos/final.mp4", fps=24)
EOF

      - name: Commit Output
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add .
          git commit -m "Generated video" || exit 0
          git push

name: Story Video Generator

permissions:
  contents: write

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Create folders
        run: |
          mkdir -p stories videos

      - name: Generate Story
        run: |
          TOPIC=$(shuf -n 1 topics.txt)

          echo "Topic: $TOPIC" > stories/story.txt
          echo "Hook: Think about $TOPIC" >> stories/story.txt
          echo "Lesson: $TOPIC is important in life" >> stories/story.txt
          echo "Ending: Respect $TOPIC always" >> stories/story.txt

      - name: Create Video
        run: |
          python generate_video.py

      - name: Commit Output
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add .
          git commit -m "Generated video" || exit 0
          git push

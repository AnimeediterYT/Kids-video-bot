name: Full Shorts Automation

permissions:
  contents: write

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Create folders
        run: |
          mkdir -p stories audio videos

      - name: Generate Script + Voice
        run: python generate.py

      - name: Create Video
        run: python video.py

      - name: Commit Output
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add .
          git commit -m "Generated Shorts" || exit 0
          git push

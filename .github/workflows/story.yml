name: Full AI Video System

on:
  schedule:
    - cron: "0 13 * * *"
    - cron: "0 17 * * *"
    - cron: "0 23 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # ----------------------------
      # SETUP PYTHON
      # ----------------------------
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # ----------------------------
      # INSTALL DEPENDENCIES
      # ----------------------------
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install edge-tts moviepy==1.0.3 imageio[ffmpeg] google-api-python-client google-auth google-auth-oauthlib requests numpy duckduckgo_search

      # ----------------------------
      # SETUP WORKSPACE
      # ----------------------------
      - name: Setup Workspace
        run: mkdir -p stories audio output queue

      # ----------------------------
      # GENERATE SCRIPT
      # ----------------------------
      - name: Generate Content
        env:
          PRIMARY_AI_API_KEY: ${{ secrets.PRIMARY_AI_API_KEY }}
        run: |
          python agent_supervisor.py

          echo "📁 DEBUG AFTER GENERATION:"
          ls -R

          if [ ! -f current_matchup.json ]; then
            echo "❌ current_matchup.json missing"
            exit 1
          fi

      # ----------------------------
      # VIDEO CREATION
      # ----------------------------
      - name: Create Video
        run: |
          python video.py

          echo "📁 DEBUG AFTER VIDEO:"
          ls -R

          if [ ! -f output/output_video.mp4 ]; then
            echo "❌ VIDEO NOT GENERATED"
            exit 1
          fi

          echo "✅ VIDEO CREATED SUCCESSFULLY"

      # ----------------------------
      # STAGE VIDEO SAFELY
      # ----------------------------
      - name: Stage Video
        run: |
          TIMESTAMP=$(date +%s)

          mkdir -p queue

          if [ ! -f output/output_video.mp4 ]; then
            echo "❌ MISSING VIDEO FILE"
            exit 1
          fi

          mv output/output_video.mp4 queue/video_${TIMESTAMP}.mp4
          mv current_matchup.json queue/meta_${TIMESTAMP}.json || true

          echo "✅ VIDEO STAGED"

      # ----------------------------
      # UPLOAD STEP (SCHEDULE ONLY)
      # ----------------------------
      - name: Upload Video
        if: github.event_name == 'schedule'
        env:
          PRIMARY_AI_API_KEY: ${{ secrets.PRIMARY_AI_API_KEY }}
          YOUTUBE_CLIENT_SECRETS: ${{ secrets.YOUTUBE_CLIENT_SECRETS }}
          YOUTUBE_REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
        run: |
          OLDEST_VIDEO=$(ls queue/video_*.mp4 2>/dev/null | head -n 1)

          if [ -z "$OLDEST_VIDEO" ]; then
            echo "⚠️ No queued video, generating fresh one..."
            python agent_supervisor.py
            python video.py
          else
            echo "🚀 Uploading queued video..."
            cp "$OLDEST_VIDEO" output/output_video.mp4
            cp queue/meta_*.json current_matchup.json || true
          fi

          python Upload.py

          if [ $? -ne 0 ]; then
            echo "❌ UPLOAD FAILED"
            exit 1
          fi

          echo "🎉 UPLOAD SUCCESS"

      # ----------------------------
      # SAVE QUEUE STATE
      # ----------------------------
      - name: Save Queue
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          mkdir -p queue && touch queue/.gitkeep

          git add queue/
          git diff --quiet && git diff --staged --quiet || git commit -m "sync queue" && git push
          mkdir -p queue && touch queue/.gitkeep

          git add queue/
          git diff --quiet && git diff --staged --quiet || git commit -m "sync queue" && git push

name: Full Video Automation

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install moviepy==1.0.3 gtts imageio[ffmpeg]

      - name: Create folders
        run: |
          mkdir -p stories audio videos

      - name: Generate script + voice
        run: python generate.py

      - name: Create video
        run: python video.py

      - name: Commit and push output
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "generated video" || exit 0
          git push origin HEAD:main

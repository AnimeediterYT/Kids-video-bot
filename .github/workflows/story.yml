name: Full AI Video System

on:
  schedule:
    - cron: "0 13 * * *"   # 💥 SLOT 1: 8:00 AM EST
    - cron: "0 17 * * *"   # 💥 SLOT 2: 12:00 PM EST
    - cron: "0 23 * * *"   # 💥 SLOT 3: 6:00 PM EST
  workflow_dispatch:       # 🛠️ MANUAL TRIGGER: Generates and stages a video into the queue

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install ImageMagick & Smash Security Restrictions
        run: |
          sudo apt-get update
          sudo apt-get install -y imagemagick
          sudo rm -f /etc/ImageMagick-6/policy.xml
          sudo rm -f /etc/ImageMagick-7/policy.xml

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install edge-tts moviepy==1.0.3 imageio[ffmpeg] google-api-python-client google-auth google-auth-oauthlib requests numpy duckduckgo_search

      - name: Create Workspace Folders
        run: mkdir -p stories audio videos output queue

      # 🛠️ MANUAL RUN LOGIC: Hands control over to the self-healing supervisor
      - name: Generate and Queue Video (Manual Mode)
        if: github.event_name == 'workflow_dispatch'
        env:
          PRIMARY_AI_API_KEY: ${{ secrets.PRIMARY_AI_API_KEY }}
        run: |
          python agent_supervisor.py
          TIMESTAMP=$(date +%s)
          if [ -f output_video.mp4 ]; then
            mv output_video.mp4 queue/video_${TIMESTAMP}.mp4
            mv current_matchup.json queue/meta_${TIMESTAMP}.json
            echo "✅ Video successfully staged inside the local queue folder!"
          fi

      # ⏰ SCHEDULED RUN LOGIC: Take the oldest video from the queue and post it
      - name: Process Scheduled Upload (Schedule Mode)
        if: github.event_name == 'schedule'
        env:
          YOUTUBE_CLIENT_SECRETS: ${{ secrets.YOUTUBE_CLIENT_SECRETS }}
          YOUTUBE_REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
        run: |
          OLDEST_VIDEO=$(ls queue/video_*.mp4 2>/dev/null | head -n 1)
          if [ -z "$OLDEST_VIDEO" ]; then
            echo "⚠️ Queue empty! Running live dynamic setup..."
            python agent_supervisor.py
            python Upload.py
          else
            echo "🚀 Found staged video: $OLDEST_VIDEO. Preparing upload sequence..."
            cp "$OLDEST_VIDEO" output_video.mp4
            TIMESTAMP=$(echo "$OLDEST_VIDEO" | sed 's/[^0-9]//g')
            cp "queue/meta_${TIMESTAMP}.json" current_matchup.json
            python Upload.py
            rm "$OLDEST_VIDEO"
            rm "queue/meta_${TIMESTAMP}.json"
            echo "✅ Video uploaded and cleared from local storage queue!"
          fi

      - name: Save Queue Progress to Repository
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add queue/
          git diff --quiet && git diff --staged --quiet || (git commit -m "Sync system video storage queue [skip ci]" && git push origin HEAD:main)
          

name: Story Generator

on:
  workflow_dispatch:

jobs:
  create-story:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Create Story
        run: |
          echo "The rabbit learned honesty." > stories/story.txt

      - name: Commit
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add .
          git commit -m "Generated story" || exit 0
          git push

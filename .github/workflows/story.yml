name: Full Video Automation

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          pip install moviepy imageio[ffmpeg] gtts

      - name: Create folders
        run: |
          mkdir -p stories audio videos

      - name: Generate script + voice
        run: python generate.py

      - name: Create video
        run: python video.py

      - name: Upload results
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add .
          git commit -m "generated video" || exit 0
          git push

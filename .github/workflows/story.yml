name: Full AI Video System

on:
  schedule:
    - cron: "0 13 * * *"
    - cron: "0 17 * * *"
    - cron: "0 23 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install ImageMagick & Fix Policy
        run: |
          sudo apt-get update
          sudo apt-get install -y imagemagick
          sudo find /etc/ImageMagick* -name "policy.xml" -exec rm -f {} \; || true

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install edge-tts moviepy==1.0.3 imageio[ffmpeg] google-api-python-client google-auth google-auth-oauthlib requests numpy duckduckgo_search

      - name: Create Folders
        run: mkdir -p stories audio videos output queue

      # ================= MANUAL =================
      - name: Generate (Manual Mode)
        if: github.event_name == 'workflow_dispatch'
        env:
          PRIMARY_AI_API_KEY: ${{ secrets.PRIMARY_AI_API_KEY }}
        run: |
          python agent_supervisor.py || true

          TIMESTAMP=$(date +%s)

          if [ -f output/output_video.mp4 ]; then
            mv output/output_video.mp4 queue/video_${TIMESTAMP}.mp4
            mv current_matchup.json queue/meta_${TIMESTAMP}.json
            echo "✅ Video queued successfully"
          else
            echo "❌ No video found"
          fi

      # ================= SCHEDULE =================
      - name: Upload (Schedule Mode)
        if: github.event_name == 'schedule'
        env:
          PRIMARY_AI_API_KEY: ${{ secrets.PRIMARY_AI_API_KEY }}
          YOUTUBE_CLIENT_SECRETS: ${{ secrets.YOUTUBE_CLIENT_SECRETS }}
          YOUTUBE_REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
        run: |
          set +e

          OLDEST_VIDEO=$(ls queue/video_*.mp4 2>/dev/null | head -n 1)

          if [ -z "$OLDEST_VIDEO" ]; then
            echo "⚠️ Queue empty → generating live video"
            python agent_supervisor.py || true
            python Upload.py || true
            exit 0
          fi

          echo "🚀 Processing: $OLDEST_VIDEO"

          cp "$OLDEST_VIDEO" output/output_video.mp4

          TIMESTAMP=$(echo "$OLDEST_VIDEO" | sed 's/[^0-9]//g')

          if [ -f "queue/meta_${TIMESTAMP}.json" ]; then
            cp "queue/meta_${TIMESTAMP}.json" current_matchup.json
          fi

          python Upload.py || true

          rm -f "$OLDEST_VIDEO"
          rm -f "queue/meta_${TIMESTAMP}.json"

          echo "✅ Upload completed"

      # ================= SAVE QUEUE =================
      - name: Save Queue
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          mkdir -p queue
          touch queue/.gitkeep

          git add queue/

          git diff --quiet && git diff --staged --quiet || (
            git commit -m "Sync queue [skip ci]" && git push
          )

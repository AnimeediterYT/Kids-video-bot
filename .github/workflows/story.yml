name: Full AI Video System

on:
  schedule:
    - cron: "0 2 * * *"
    - cron: "0 14 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install edge-tts moviepy==1.0.3 imageio[ffmpeg] google-api-python-client google-auth google-auth-oauthlib

      - name: Create folders
        run: |
          mkdir -p stories audio videos

      - name: Generate script + voice
        run: python generate.py

      - name: Create video
        run: python video.py

      - name: Upload to YouTube
        run: python upload.py

      - name: Commit output
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "auto video uploaded" || exit 0
          git push origin HEAD:main
